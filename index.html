let direction = "mix";     // ar→en|en→ar|mix
let cardCount = 20;
let deck = [];
let deckIdx = 0;
let isDrill = false;
let flipped = false;
let speaking = null;
let currentScreen = "menu";

// ── HELPERS ───────────────────────────────────────────────────────────────
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}
function failedVerbs(){return verbs.filter(v=>(stats[v.en]||{}).fails>0);}
function makeDir(){return direction==="mix"?(Math.random()>.5?"ar→en":"en→ar"):direction;}

function speakAr(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ar-SA";u.rate=0.85;
  const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith("ar"));
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

function buildNormalDeck(){
  const pool=shuffle(verbs).slice(0,cardCount);
  const w=[];
  pool.forEach(v=>{
    const f=(stats[v.en]||{}).fails||0;
    w.push(v);
    if(f>=2)w.push(v);
    if(f>=5)w.push(v);
  });
  return shuffle(w).map(v=>({verb:v,dir:makeDir()}));
}
function buildDrillDeck(){
  return shuffle(failedVerbs()).map(v=>({verb:v,dir:makeDir()}));
}

// ── NAVIGATE ──────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
  currentScreen=id;
  window.scrollTo(0,0);
}

// ── ARABIC BLOCK ──────────────────────────────────────────────────────────
function arabicBlock(verb, color){
  const showP = tenseMode!=="past", showPa = tenseMode!=="present";
  const c = color||"#fff";
  let html = '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">';
  if(showP){
    html+=`<div class="ar-box-present">
      <div class="badge-present">مضارع · Present</div>
      <div class="ar" style="font-size:42px;color:${c};line-height:1.4;margin-top:8px">${verb.present}</div>
      <button class="speak-btn" style="color:#f9d423" onclick="speakAr(${JSON.stringify(verb.present)});this.textContent='🔊';setTimeout(()=>this.textContent='🔈',1800)">🔈</button>
    </div>`;
  }
  if(showPa){
    html+=`<div class="ar-box-past">
      <div class="badge-past">ماضي · Past</div>
      <div class="ar" style="font-size:42px;color:${c};line-height:1.4;margin-top:8px">${verb.past}</div>
      <button class="speak-btn" style="color:#ff4e50" onclick="speakAr(${JSON.stringify(verb.past)});this.textContent='🔊';setTimeout(()=>this.textContent='🔈',1800)">🔈</button>
    </div>`;
  }
  html+='</div>';
  return html;
}

// GAME
// ══════════════════════════════════════════════════════════════════════════
function startGame(drill){
  isDrill=drill;
  deck = drill ? buildDrillDeck() : buildNormalDeck();
  if(deck.length===0){renderMenu();return;}
  deckIdx=0;flipped=false;
  showScreen("game");renderCard();
}
function startDrill(){
  if(failedVerbs().length===0)return;
  startGame(true);
}

function renderCard(){
  const el=document.getElementById("screen-game");
  if(deckIdx>=deck.length){renderGameDone();return;}
  const card=deck[deckIdx];
  const isAr=card.dir==="ar→en";
  const pct=(deckIdx/deck.length)*100;

  let toastHtml="";
  if(isDrill){
    toastHtml=`<div style="margin-bottom:10px;padding:4px 14px;border-radius:20px;font-size:12px;letter-spacing:1px;border:1px solid #f87171;color:#f87171;text-transform:uppercase;display:inline-block">🔥 Mode errors</div>`;
  }

  const frontHtml = isAr
    ? arabicBlock(card.verb)
    : `<div style="text-align:center"><p style="font-size:34px;margin:0;font-style:italic;line-height:1.3">${card.verb.en}</p></div>`;

  const backHtml = flipped
    ? (isAr
        ? `<div style="margin-top:20px;border-top:2px solid #2a2a2a;padding-top:18px;text-align:center"><p style="font-size:32px;margin:0;color:#f9d423;font-style:italic">${card.verb.en}</p></div>`
        : `<div style="margin-top:24px;border-top:2px solid #2a2a2a;padding-top:22px">${arabicBlock(card.verb,"#f9d423")}</div>`)
    : `<p style="color:#555;font-size:15px;text-align:center;margin-top:20px">toca per veure ${isAr?"la traducció":"l'àrab"}</p>`;

  const btnsHtml = flipped
    ? `<div style="display:flex;gap:16px;margin-top:22px"><button class="btn-no" onclick="answer(false)">✗</button><button class="btn-yes" onclick="answer(true)">✓</button></div>`
    : `<div style="margin-top:24px;display:flex;gap:10px;justify-content:center">
        <div style="width:10px;height:10px;border-radius:50%;background:#444"></div>
        <div style="width:10px;height:10px;border-radius:50%;background:#f9d423;animation:pulse 1.5s infinite"></div>
        <div style="width:10px;height:10px;border-radius:50%;background:#444"></div>
       </div>`;

  el.innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:24px 16px">
    <div class="wrap" style="padding-left:0;padding-right:0">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
        <button onclick="showScreen('menu');renderMenu()" style="background:none;border:none;color:#888;font-size:28px;cursor:pointer">←</button>
        <div class="grad-bar" style="flex:1"><div class="grad-bar-fill" style="width:${pct}%"></div></div>
        <span style="color:#888;font-size:17px">${deckIdx+1}/${deck.length}</span>
      </div>
      <div style="text-align:center;margin-bottom:12px">${toastHtml}</div>
      <div class="card" onclick="flipCard()" style="cursor:${flipped?'default':'pointer'}">
        ${frontHtml}${backHtml}
      </div>
      ${btnsHtml}
    </div>
  </div>`;
}

function flipCard(){
  if(!flipped){flipped=true;renderCard();}
}

function answer(correct){
  const verb=deck[deckIdx].verb;
  let graduated=false;
  const e=stats[verb.en]||{fails:0,streak:0};
  if(isDrill){
    const newStreak=correct?e.streak+1:0;
    if(newStreak>=3){graduated=true;stats[verb.en]={fails:0,streak:0};}
    else stats[verb.en]={fails:correct?e.fails:e.fails+1,streak:newStreak};
  } else {
    stats[verb.en]={fails:correct?e.fails:e.fails+1,streak:correct?e.streak:0};
  }
  saveStats(stats);

  if(graduated){
    // brief flash
    const el=document.getElementById("screen-game");
    const toast=document.createElement("div");
    toast.textContent=`🎓 "${verb.en}" graduada!`;
    toast.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(74,222,128,.2);border:1px solid #4ade80;border-radius:20px;padding:10px 20px;color:#4ade80;font-size:14px;z-index:999;animation:popIn .3s ease";
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(),1500);
  }

  deckIdx++;
  flipped=false;
  if(deckIdx>=deck.length)renderGameDone();
  else renderCard();
}

function renderGameDone(){
  document.getElementById("screen-game").innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px">

    <h2 style="font-size:32px;margin:16px 0 8px;color:#f9d423">Sessió completada!</h2>

  const totalFails=list.reduce((s,v)=>s+v.fails,0);

  let rows="";
  list.forEach(v=>{
    const failBadge=v.fails>0?`<span style="font-size:12px;background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);border-radius:20px;padding:2px 10px;color:#f87171">✗ ${v.fails}</span>`:"";

        <div style="display:flex;gap:6px">${streakBadge}${failBadge}</div>
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1;background:rgba(249,212,35,.06);border-radius:10px;padding:8px;text-align:center">
          <div style="font-size:10px;color:#f9d423;margin-bottom:4px">مضارع</div>
          <div class="ar" style="font-size:26px;color:#fff">${v.present}</div>
          <button onclick="speakAr(${JSON.stringify(v.present)});this.textContent='🔊';setTimeout(()=>this.textContent='🔈',1800)" style="margin-top:4px;background:none;border:none;color:#f9d423;font-size:15px;cursor:pointer">🔈</button>

          <div style="font-size:10px;color:#ff4e50;margin-bottom:4px">ماضي</div>
          <div class="ar" style="font-size:26px;color:#fff">${v.past}</div>
          <button onclick="speakAr(${JSON.stringify(v.past)});this.textContent='🔊';setTimeout(()=>this.textContent='🔈',1800)" style="margin-top:4px;background:none;border:none;color:#ff4e50;font-size:15px;cursor:pointer">🔈</button>
        </div>
      </div>
    </div>`;
  });

  el.innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:24px 16px">
    <div style="max-width:640px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
        <button onclick="showScreen('menu');renderMenu()" style="background:none;border:none;color:#888;font-size:28px;cursor:pointer">←</button>
        <h2 style="font-size:22px;background:linear-gradient(90deg,#f9d423,#ff4e50);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Tots els verbs (${verbs.length})</h2>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <input type="text" value="${listSearch}" oninput="listSearch=this.value;renderList()" placeholder="Cerca..." style="flex:1;padding:11px 14px;border-radius:12px;border:1px solid #444;background:rgba(255,255,255,.06);color:#fff;font-size:16px">
        <button onclick="listSort=listSort==='fails'?'alpha':'fails';renderList()" style="padding:11px 14px;border-radius:12px;border:1px solid #444;background:rgba(255,255,255,.06);color:#aaa;font-size:13px;cursor:pointer;white-space:nowrap">${listSort==="fails"?"⬇ Errors":"A–Z"}</button>
      </div>
      ${totalFails>0?`<div style="margin-bottom:14px;color:#555;font-size:13px;text-align:center">${totalFails} errors totals acumulats</div>`:""}

function submitApiKey(){
  const inp = document.getElementById("api-key-input");
  const key = inp ? inp.value.trim() : "";
  if(key.length < 20){
    inp.style.border = "1px solid #f87171";
    inp.placeholder = "Enganxa la clau de Google AI Studio...";
    return;
  }
  saveApiKey(key);
  renderAIMenu();
}

async function callAI(system, user, history){
  const key = getApiKey();
  if(!key){ renderApiKeyScreen(); throw new Error("No API key"); }

  // Build Gemini contents array
  let contents = [];
  if(history){
    history.forEach(m => {
      contents.push({role: m.role === "assistant" ? "model" : "user", parts:[{text: m.content}]});
    });
  } else {
    contents = [{role:"user", parts:[{text: user}]}];
  }

  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}`,
    {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        system_instruction: {parts:[{text: system}]},
        contents: contents,
        generationConfig: {maxOutputTokens: 1500, temperature: 0.7}
      })
    }
  );
  if(resp.status===400||resp.status===403){
    clearApiKey();
    renderApiKeyScreen();
    throw new Error("Invalid API key");
  }
  const data = await resp.json();
  if(data.error){ throw new Error(data.error.message); }
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

function showAILoading(title){
  document.getElementById("screen-ai-activity").innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center">
    <div style="font-size:48px;animation:pulse 1s infinite">✨</div>
    <p style="color:#a78bfa;font-size:18px;margin-top:16px">Generant ${title}...</p>
  </div>`;
  showScreen("ai-activity");
}

async function startAIActivity(id){
  currentActivity=id;
  fillAnswers={};fillChecked=false;chatHistory=[];aiContent=null;
  const act=AI_ACTIVITIES.find(a=>a.id===id);
  showAILoading(act.title.toLowerCase());

  try{
    if(id==="story"){
      const txt=await callAI(
        `Ets un professor d'àrab. ${VOCAB_CONTEXT}
Escriu un conte curt (6-8 frases) en àrab MSA. Usa principalment vocabulari conegut, però pots afegir MAX 2 paraules noves per frase si aporten valor.
Per cada frase retorna les paraules individuals amb traducció per fer tooltips interactius.
Respon ÚNICAMENT en JSON sense cap text addicional ni backticks markdown:
{"sentences":[{"ar":"frase completa","ca":"traducció completa en català","words":[{"ar":"paraula","ca":"traducció al català"},...]},...]}
IMPORTANT: "words" ha de tenir TOTES les paraules de la frase en ordre. Inclou partícules i preposicions com a entrades separades.`,
        "Genera un conte curt i interessant sobre la vida quotidiana o un viatge."
      );
      aiContent=JSON.parse(txt.replace(/```json|```/g,"").trim());
      renderStory();

    }else if(id==="fill"){
      const txt=await callAI(
        `Ets un professor d'àrab. ${VOCAB_CONTEXT}
Genera 5 frases en àrab on un verb (conjugat en present o passat هو/هي) és substituït per _____.
Respon ÚNICAMENT en JSON sense cap text addicional ni backticks markdown:
{"items":[{"ar":"frase amb _____","ca":"traducció amb _____ indicant el temps verbal","answer":"el verb correcte (1 paraula)","options":["opció1","opció2","opció3","opció4"]},...]}
Les 4 opcions han de ser verbs plausibles però sols un correcte.`,
        "Genera 5 exercicis d'omplir buits."
      );
      aiContent=JSON.parse(txt.replace(/```json|```/g,"").trim());
      renderFill();

    }else if(id==="translate"){
      const txt=await callAI(
        `Ets un professor d'àrab. ${VOCAB_CONTEXT}
Genera 5 frases per traduir, alternant català→àrab i àrab→català.
Respon ÚNICAMENT en JSON sense cap text addicional ni backticks markdown:
{"items":[{"from":"frase original","to":"traducció correcta","dir":"ca→ar o ar→ca"},...]}`,
        "Genera 5 frases de traducció variades."
      );
      aiContent=JSON.parse(txt.replace(/```json|```/g,"").trim());
      renderTranslate();

    }else if(id==="chat"){
      const greeting=await callAI(
        `Ets un interlocutor àrab amable. ${VOCAB_CONTEXT}
Saluda l'estudiant en àrab, presenta't i fes una pregunta senzilla.
Format: línia en àrab \n (traducció al català entre parèntesis)`,
        "Inicia la conversa"
      );
      chatHistory=[{role:"assistant",text:greeting}];
      renderChat();
    }
  }catch(e){
    if(e.message === "No API key" || e.message === "Invalid API key") return;
    console.error("AI Error:", e);
    document.getElementById("screen-ai-activity").innerHTML=`
    <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px">
      <div style="color:#f87171;font-size:18px;text-align:center;margin-bottom:12px">Error connectant amb la IA</div>
      <div style="color:#666;font-size:13px;text-align:center;max-width:340px;word-break:break-all;margin-bottom:20px;font-family:monospace">${e.message}</div>
      <button onclick="startAIActivity(currentActivity)" style="margin-bottom:10px;padding:14px 28px;border-radius:14px;border:none;background:#7c3aed;color:#fff;font-size:16px;cursor:pointer">🔄 Tornar a intentar</button>
      <button onclick="clearApiKey();renderApiKeyScreen()" style="padding:10px 20px;border-radius:12px;border:1px solid #444;background:transparent;color:#888;font-size:14px;cursor:pointer">🔑 Canviar clau</button>
      <button onclick="showScreen('ai');renderAIMenu()" style="margin-top:8px;padding:10px 20px;border-radius:12px;border:none;background:transparent;color:#555;font-size:13px;cursor:pointer">← Tornar</button>
    </div>`;
  }
}

function aiHeader(title){
  return `<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
    <button onclick="showScreen('ai');renderAIMenu()" style="background:none;border:none;color:#888;font-size:28px;cursor:pointer">←</button>
    <h2 style="font-size:20px;color:#a78bfa">${title}</h2>
    <button onclick="startAIActivity(currentActivity)" style="margin-left:auto;padding:8px 14px;border-radius:12px;border:1px solid rgba(167,139,250,.4);background:rgba(167,139,250,.1);color:#a78bfa;font-size:13px;cursor:pointer">🔄 Nova</button>
  </div>`;
}

// ── STORY ──
function renderStory(){
  if(!aiContent||!aiContent.sentences){return;}
  const rows=aiContent.sentences.map((s,i)=>{
    // Build tooltip words
    let wordsHtml="";
    if(s.words&&s.words.length>0){
      wordsHtml=s.words.map(w=>`<span class="tip-word" onclick="this.classList.toggle('tip-open')" onmouseenter="this.classList.add('tip-open')" onmouseleave="this.classList.remove('tip-open')">
        <span class="ar" style="font-size:26px;color:#fff;border-bottom:1px dotted rgba(167,139,250,.5);padding-bottom:2px">${w.ar}</span>
        <span class="tip">${w.ca}</span>
      </span>`).join(" ");
    }else{
      wordsHtml=`<span class="ar" style="font-size:26px;color:#fff;line-height:1.6">${s.ar}</span>`;
    }
    return `<div style="background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.2);border-radius:16px;padding:16px 18px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
        <div style="flex:1;direction:rtl;display:flex;flex-wrap:wrap;gap:6px 10px;justify-content:flex-start;align-items:baseline">${wordsHtml}</div>
        <button onclick="speakAr(${JSON.stringify(s.ar)});this.textContent='🔊';setTimeout(()=>this.textContent='🔈',1800)" style="background:none;border:none;color:#555;font-size:20px;cursor:pointer;flex-shrink:0">🔈</button>
      </div>
      <div style="color:#888;font-size:14px;font-style:italic;border-top:1px solid rgba(255,255,255,.06);padding-top:8px">${s.ca}</div>
    </div>`;
  }).join("");

  const fullTrans=aiContent.sentences.map((s,i)=>`<p style="color:#aaa;font-size:14px;margin:0 0 6px;font-style:italic;line-height:1.6">${i+1}. ${s.ca}</p>`).join("");

  document.getElementById("screen-ai-activity").innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:24px 16px">
    <div style="max-width:580px;margin:0 auto">
      ${aiHeader("📖 Conte generat")}
      <p style="color:#666;font-size:12px;text-align:center;margin-bottom:16px">💡 Toca cada paraula per veure la traducció</p>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${rows}
        <div style="background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.25);border-radius:16px;padding:16px 18px">
          <div style="font-size:12px;color:#a78bfa;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">📖 Traducció completa</div>
          ${fullTrans}
        </div>
      </div>
    </div>
  </div>`;
}

// ── FILL ──
function renderFill(){
  if(!aiContent||!aiContent.items)return;
  const rows=aiContent.items.map((item,i)=>{
    const chosen=fillAnswers[i];
    const isCorrect=chosen===item.answer;
    const borderColor=fillChecked?(isCorrect?"rgba(74,222,128,.4)":"rgba(248,113,113,.4)"):"rgba(167,139,250,.2)";
    const opts=item.options.map(opt=>{
      let bg="rgba(255,255,255,.05)",border="1px solid #444",color="#aaa";
      if(chosen===opt){bg="rgba(167,139,250,.2)";border="1px solid #a78bfa";color="#a78bfa";}
      if(fillChecked&&opt===item.answer){bg="rgba(74,222,128,.15)";border="1px solid #4ade80";color="#4ade80";}
      if(fillChecked&&chosen===opt&&chosen!==item.answer){bg="rgba(248,113,113,.15)";border="1px solid #f87171";color="#f87171";}
      return `<button onclick="${fillChecked?"":`selectFill(${i},'${opt.replace(/'/g,"\'")}')`}" style="padding:8px 14px;border-radius:10px;border:${border};background:${bg};color:${color};font-family:Arial,sans-serif;font-size:18px;cursor:${fillChecked?"default":"pointer"};direction:rtl">${opt}</button>`;
    }).join("");
    return `<div style="background:rgba(255,255,255,.05);border:1px solid ${borderColor};border-radius:16px;padding:16px 18px">
      <div class="ar" style="font-size:22px;color:#fff;margin-bottom:6px;line-height:1.6">${item.ar}</div>
      <div style="color:#888;font-size:13px;margin-bottom:12px;font-style:italic">${item.ca}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${opts}</div>
    </div>`;
  }).join("");

  const correctCount=Object.entries(fillAnswers).filter(([i,v])=>v===aiContent.items[i].answer).length;
  const checkBtn=fillChecked
    ? `<div style="text-align:center;padding:16px;border-radius:16px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3)"><span style="font-size:24px;color:#a78bfa">${correctCount} / ${aiContent.items.length} correctes</span></div>`
    : `<button onclick="checkFill()" style="padding:16px;border-radius:16px;border:none;background:linear-gradient(90deg,#7c3aed,#ec4899);color:#fff;font-weight:700;font-size:18px;cursor:pointer;width:100%">Comprovar respostes</button>`;

  document.getElementById("screen-ai-activity").innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:24px 16px">
    <div style="max-width:580px;margin:0 auto">
      ${aiHeader("✏️ Omple els buits")}
      <div style="display:flex;flex-direction:column;gap:16px">
        ${rows}
        ${checkBtn}
      </div>
    </div>
  </div>`;
}

function selectFill(i, opt){
  fillAnswers[i]=opt;
  renderFill();
}
function checkFill(){
  fillChecked=true;
  renderFill();
}

// ── TRANSLATE ──
let translateRevealed={};
function renderTranslate(){
  if(!aiContent||!aiContent.items)return;
  const rows=aiContent.items.map((item,i)=>{
    const isAr=item.dir==="ar→ca";
    const revealed=translateRevealed[i];
    const fromHtml=isAr
      ? `<div class="ar" style="font-size:26px;color:#fff;line-height:1.5">${item.from}</div>`
      : `<div style="font-size:18px;color:#fff;line-height:1.5;font-style:italic">${item.from}</div>`;
    const toHtml=revealed
      ? (isAr
          ? `<div style="font-size:16px;color:#f9d423;font-style:italic;margin-top:4px">${item.to}</div>`
          : `<div class="ar" style="font-size:26px;color:#f9d423;line-height:1.5;margin-top:4px">${item.to}
              <button onclick="speakAr(${JSON.stringify(item.to)});this.textContent='🔊';setTimeout(()=>this.textContent='🔈',1800)" style="background:none;border:none;color:#a78bfa;font-size:16px;cursor:pointer">🔈</button>
             </div>`)
      : `<button onclick="revealTranslate(${i})" style="margin-top:10px;padding:8px 16px;border-radius:10px;border:1px solid rgba(167,139,250,.4);background:rgba(167,139,250,.1);color:#a78bfa;font-size:14px;cursor:pointer">Veure traducció</button>`;
    return `<div style="background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.2);border-radius:16px;padding:16px 18px">
      <div style="font-size:12px;color:#a78bfa;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">${item.dir}</div>
      ${fromHtml}${toHtml}
    </div>`;
  }).join("");

  document.getElementById("screen-ai-activity").innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:24px 16px">
    <div style="max-width:580px;margin:0 auto">
      ${aiHeader("🔄 Traducció")}
      <div style="display:flex;flex-direction:column;gap:12px">${rows}</div>
    </div>
  </div>`;
}
function revealTranslate(i){
  translateRevealed[i]=true;
  renderTranslate();
}

// ── CHAT ──
function renderChat(){
  const msgs=chatHistory.map(m=>{
    const isAI=m.role==="assistant";
    if(isAI){
      const lines=m.text.split("\n");
      const arLine=`<div class="ar" style="font-size:20px;color:#fff;line-height:1.6">${lines[0]||""}</div>`;
      const rest=lines.slice(1).map(l=>`<div style="color:#aaa;font-size:13px;font-style:italic">${l}</div>`).join("");
      const speakBtn=lines[0]?`<button onclick="speakAr(${JSON.stringify(lines[0])});this.textContent='🔊';setTimeout(()=>this.textContent='🔈',1800)" style="background:none;border:none;color:#555;font-size:16px;cursor:pointer;margin-top:4px">🔈</button>`:"";
      return `<div style="display:flex;justify-content:flex-start">
        <div style="max-width:85%;padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)">
          ${arLine}${rest}${speakBtn}
        </div>
      </div>`;
    }else{
      return `<div style="display:flex;justify-content:flex-end">
        <div style="max-width:85%;padding:14px 16px;border-radius:18px;background:rgba(124,58,237,.3);border:1px solid rgba(124,58,237,.5)">
          <span style="color:#e2e8f0;font-size:16px">${m.text}</span>
        </div>
      </div>`;
    }
  }).join("");

  const quickBtns=["مَرْحَبَا! أَنَا عُمَر","كَيْفَ حَالُك؟","لَا أَفْهَمُ، كَرِّرْ مِنْ فَضْلِك","شُكْرًا!"]
    .map(s=>`<button onclick="setChatInput(${JSON.stringify(s)})" class="ar" style="padding:6px 12px;border-radius:10px;border:1px solid #444;background:rgba(255,255,255,.04);color:#888;font-size:13px;cursor:pointer;direction:rtl">${s}</button>`)
    .join("");

  document.getElementById("screen-ai-activity").innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:24px 16px;display:flex;flex-direction:column">
    <div style="max-width:580px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column">
      ${aiHeader("💬 Conversa")}
      <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;margin-bottom:16px;max-height:55vh">${msgs}
        ${chatHistory.length>0&&chatHistory[chatHistory.length-1].role==="user"?'<div style="color:#a78bfa;font-size:14px;text-align:center;padding:8px;animation:pulse 1s infinite">✨ Escrivint...</div>':""}
      </div>
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <input type="text" id="chat-input" placeholder="Escriu en àrab o català..." onkeydown="if(event.key==='Enter')sendChat()" style="flex:1;padding:14px 16px;border-radius:14px;border:1px solid rgba(167,139,250,.4);background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-family:Arial,sans-serif">
        <button onclick="sendChat()" style="padding:14px 18px;border-radius:14px;border:none;background:linear-gradient(90deg,#7c3aed,#ec4899);color:#fff;font-size:20px;cursor:pointer">➤</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${quickBtns}</div>
    </div>
  </div>`;
}

function setChatInput(text){
  const inp=document.getElementById("chat-input");
  if(inp)inp.value=text;
}

async function sendChat(){
  const inp=document.getElementById("chat-input");
  if(!inp||!inp.value.trim())return;
  const userText=inp.value.trim();
  chatHistory.push({role:"assistant",text:""});// placeholder
  chatHistory.pop();
  chatHistory.push({role:"user",text:userText});
  renderChat(); // show user message + loading

  const histForAI=chatHistory.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
  try{
    const reply=await callAI(
      `Ets un interlocutor àrab amable i pacient. ${VOCAB_CONTEXT}
Conversa en àrab usant vocabulari conegut. Si l'estudiant comet errors, corregeix-los amablement.
Format per cada missatge teu: primera línia en àrab, segona línia traducció al català entre parèntesis. Si cal, afegeix: 💡 Correcció: ...`,
      null,
      histForAI
    );
    chatHistory.push({role:"assistant",text:reply});
  }catch(e){
    chatHistory.push({role:"assistant",text:"Error de connexió. Torna-ho a intentar."});
  }
  renderChat();
}
